<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Center | Управление пользователями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            padding: 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Glassmorphism карточки */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: 0 8px 30px rgba(0, 100, 200, 0.1);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #475569;
            font-size: 0.95rem;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 500;
            color: #0f172a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #1e293b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button.danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        button.danger:hover {
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .stats-btn {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .stats-btn:hover {
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover td {
            background: #f1f5f9;
        }

        .pagination {
            display: flex;
            gap: 8px;
            margin-top: 28px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .page-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: #334155;
        }

        .page-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .page-btn.disabled {
            background: transparent;
            border: none;
            cursor: default;
            color: #94a3b8;
        }

        .page-btn.disabled:hover {
            background: transparent;
            transform: none;
            box-shadow: none;
        }

        /* Алерты */
        .alert {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 60px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-weight: 500;
            backdrop-filter: blur(8px);
        }

        .alert-success {
            background: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .alert-error {
            background: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .stats-info {
            margin-bottom: 20px;
            color: #475569;
            font-size: 0.9rem;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            body {
                padding: 16px;
            }
            .card {
                padding: 20px;
            }
            .page-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }

        .delete-btn {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
            color: white;
            transform: scale(1.02);
        }

        /* Бейдж для id */
        .id-badge {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: monospace;
        }

        /* Стиль для счётчика */
        .stat-number {
            font-weight: 700;
            color: #2563eb;
        }

        /* Карточка статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 16px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
        }

        .stat-sub {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 16px;
            margin-top: 8px;
        }

        .user-card p {
            margin: 8px 0;
            font-size: 0.9rem;
            color: #334155;
        }

        .user-card strong {
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>👥 User Center</h1>
            <p class="subtitle">Управление пользователями | FastAPI + PostgreSQL | Docker</p>
        </div>

        <!-- Карточка статистики -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <h2>📊 Статистика</h2>
                <button id="loadStatsBtn" class="stats-btn" onclick="loadStats()">🔄 Обновить статистику</button>
            </div>
            <div id="statsContainer">
                <p style="text-align: center; color: #64748b; padding: 20px;">Нажмите "Обновить статистику", чтобы загрузить данные</p>
            </div>
        </div>

        <div class="two-columns">
            <div class="card">
                <h2>➕ Добавить пользователя</h2>
                <form id="addForm">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="name" placeholder="Введите имя" required>
                    </div>
                    <div class="form-group">
                        <label>Возраст</label>
                        <input type="number" id="age" placeholder="18+" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="user@example.com" required>
                    </div>
                    <button type="submit">➕ Создать пользователя</button>
                </form>
            </div>

            <div class="card">
                <h2>🔐 Админ-панель</h2>
                <div class="form-group">
                    <label>Админ-пароль</label>
                    <input type="password" id="adminPassword" placeholder="Введите пароль">
                </div>
                <button onclick="clearAll()" class="danger">🗑️ Очистить всех пользователей</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 Список пользователей</h2>
            <div class="stats-info">
                <span id="stats">📊 Загрузка...</span>
                <div>
                    <label style="display: inline; margin-right: 8px;">Показывать:</label>
                    <select id="limitSelect" style="width: auto;">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
            <div id="usersList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentLimit = 10;

        async function loadUsers() {
            try {
                const res = await fetch(`/users?limit=${currentLimit}&page=${currentPage}`);
                const data = await res.json();
                
                if (data.success) {
                    renderUsers(data.data);
                    renderPagination(data);
                    document.getElementById('stats').innerHTML = `📊 Всего: <span class="stat-number">${data.total.toLocaleString()}</span> пользователей | Страница <span class="stat-number">${data.page}</span> из <span class="stat-number">${data.total_pages.toLocaleString()}</span>`;
                } else {
                    document.getElementById('usersList').innerHTML = '<p>Нет пользователей</p>';
                }
            } catch (e) {
                document.getElementById('usersList').innerHTML = '<p>⚠️ Ошибка загрузки данных</p>';
            }
        }

        async function loadStats() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '<p style="text-align: center; color: #64748b;">Загрузка статистики...</p>';
            
            try {
                const res = await fetch('/stats');
                const data = await res.json();
                
                if (data.success && data.data) {
                    const stats = data.data;
                    const oldest = stats.oldest_user || {};
                    const youngest = stats.youngest_user || {};
                    
                    container.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-label">Всего пользователей</div>
                                <div class="stat-value">${stats.total_users?.toLocaleString() || 0}</div>
                                <div class="stat-sub">аккаунтов</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Средний возраст</div>
                                <div class="stat-value">${stats.mean_age || 0}</div>
                                <div class="stat-sub">лет</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Самый старший</div>
                                <div class="stat-value">${oldest.age || '-'}</div>
                                <div class="stat-sub">${escapeHtml(oldest.name || '-')}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Самый младший</div>
                                <div class="stat-value">${youngest.age || '-'}</div>
                                <div class="stat-sub">${escapeHtml(youngest.name || '-')}</div>
                            </div>
                        </div>
                        ${oldest.name ? `
                        <div style="margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap;">
                            <div class="user-card" style="flex: 1;">
                                <strong>👑 Самый старший пользователь</strong>
                                <p><strong>Имя:</strong> ${escapeHtml(oldest.name)}</p>
                                <p><strong>Возраст:</strong> ${oldest.age} лет</p>
                                <p><strong>Email:</strong> ${escapeHtml(oldest.email)}</p>
                                <p><strong>ID:</strong> #${oldest.id}</p>
                            </div>
                            <div class="user-card" style="flex: 1;">
                                <strong>🍼 Самый младший пользователь</strong>
                                <p><strong>Имя:</strong> ${escapeHtml(youngest.name)}</p>
                                <p><strong>Возраст:</strong> ${youngest.age} лет</p>
                                <p><strong>Email:</strong> ${escapeHtml(youngest.email)}</p>
                                <p><strong>ID:</strong> #${youngest.id}</p>
                            </div>
                        </div>
                        ` : ''}
                    `;
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #64748b;">Нет данных для статистики. Добавьте пользователей!</p>';
                }
            } catch (e) {
                container.innerHTML = '<p style="text-align: center; color: #ef4444;">❌ Ошибка загрузки статистики</p>';
            }
        }

        function renderUsers(users) {
            if (!users || users.length === 0) {
                document.getElementById('usersList').innerHTML = '<p>Нет пользователей</p>';
                return;
            }

            let html = `<table><thead><tr><th>ID</th><th>Имя</th><th>Возраст</th><th>Email</th><th>Действия</th></tr></thead><tbody>`;
            users.forEach(user => {
                html += `
                    <tr>
                        <td><span class="id-badge">#${user.id}</span></td>
                        <td>${escapeHtml(user.name)}</td>
                        <td>${user.age} лет</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td><button class="delete-btn" onclick="deleteUser(${user.id})">Удалить</button></td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            document.getElementById('usersList').innerHTML = html;
        }

        function renderPagination(data) {
            if (data.total_pages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            let html = '';
            const current = data.page;
            const total = data.total_pages;
            const delta = 2;

            // Кнопки "В начало" и "Назад"
            if (current > 1) {
                html += `<div class="page-btn" onclick="goToPage(1)">«</div>`;
                html += `<div class="page-btn" onclick="goToPage(${current - 1})">‹</div>`;
            }

            let start = Math.max(2, current - delta);
            let end = Math.min(total - 1, current + delta);

            // Первая страница
            html += `<div class="page-btn ${current === 1 ? 'active' : ''}" onclick="goToPage(1)">1</div>`;

            // Многоточие после первой
            if (start > 2) {
                html += `<div class="page-btn disabled">...</div>`;
            }

            // Основной диапазон
            for (let i = start; i <= end; i++) {
                html += `<div class="page-btn ${i === current ? 'active' : ''}" onclick="goToPage(${i})">${i}</div>`;
            }

            // Многоточие перед последней
            if (end < total - 1) {
                html += `<div class="page-btn disabled">...</div>`;
            }

            // Последняя страница
            if (total > 1) {
                html += `<div class="page-btn ${current === total ? 'active' : ''}" onclick="goToPage(${total})">${total}</div>`;
            }

            // Кнопки "Вперёд" и "В конец"
            if (current < total) {
                html += `<div class="page-btn" onclick="goToPage(${current + 1})">›</div>`;
                html += `<div class="page-btn" onclick="goToPage(${total})">»</div>`;
            }

            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            if (page && page !== currentPage) {
                currentPage = page;
                loadUsers();
            }
        }

        async function addUser(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const age = parseInt(document.getElementById('age').value);
            const email = document.getElementById('email').value.trim();

            if (!name || !age || !email) {
                showAlert('Заполните все поля', 'error');
                return;
            }

            try {
                const res = await fetch('/add_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, age, email })
                });
                
                if (res.ok) {
                    showAlert('✅ Пользователь добавлен успешно', 'success');
                    document.getElementById('addForm').reset();
                    loadUsers();
                    loadStats();
                } else {
                    const data = await res.json();
                    showAlert(data.detail || 'Ошибка добавления', 'error');
                }
            } catch (e) {
                showAlert('Ошибка соединения с сервером', 'error');
            }
        }

        async function deleteUser(id) {
            const password = document.getElementById('adminPassword').value;
            
            if (!password) {
                showAlert('Введите админ-пароль', 'error');
                return;
            }

            if (!confirm(`Удалить пользователя ID ${id}?`)) return;

            try {
                const res = await fetch('/delete_user', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, password: password })
                });
                
                if (res.ok) {
                    showAlert('✅ Пользователь удалён', 'success');
                    loadUsers();
                    loadStats();
                } else {
                    const data = await res.json();
                    showAlert(data.detail || 'Ошибка удаления', 'error');
                }
            } catch (e) {
                showAlert('Ошибка соединения', 'error');
            }
        }

        async function clearAll() {
            const password = document.getElementById('adminPassword').value;
            
            if (!password) {
                showAlert('Введите админ-пароль', 'error');
                return;
            }

            if (!confirm('⚠️ Очистить всех пользователей? Это действие НЕОБРАТИМО!')) return;

            try {
                const res = await fetch('/clear', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                if (res.ok) {
                    showAlert('✅ Все пользователи удалены', 'success');
                    loadUsers();
                    loadStats();
                } else {
                    const data = await res.json();
                    showAlert(data.detail || 'Ошибка очистки', 'error');
                }
            } catch (e) {
                showAlert('Ошибка соединения', 'error');
            }
        }

        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('addForm').addEventListener('submit', addUser);
        document.getElementById('limitSelect').addEventListener('change', (e) => {
            currentLimit = parseInt(e.target.value);
            currentPage = 1;
            loadUsers();
        });

        loadUsers();
    </script>
</body>
</html>
